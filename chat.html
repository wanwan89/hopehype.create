<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HopeTalk globe</title>
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/toast.css">
  <script src="js/toast.js"></script>
  <link rel="icon" type="asets/png/book.png" href="asets/png/book.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<audio id="send-sound" src="asets/sound/send.mp3" preload="auto"></audio>
<audio id="receive-sound" src="asets/sound/receive.mp3" preload="auto"></audio>


  <div class="telegram-chat">
    <div class="chat-header" style="position: relative; display: flex; align-items: center; padding: 0 15px; background: #3a7bd5; color: white; height: 65px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); overflow: visible;">
      <div style="display: flex; align-items: center; gap: 12px;">
        <div class="hamburger-btn" id="menu-btn" style="cursor: pointer;">
          <div class="hamburger-line"></div>
          <div class="hamburger-line"></div>
          <div class="hamburger-line"></div>
        </div>

        <div style="display: flex; flex-direction: column; justify-content: center;">
          <h3 style="margin: 0; font-size: 17px; font-weight: 600; letter-spacing: 0.3px;">HopeTalk Globe</h3>
          <div id="status-container" style="font-size: 10px; margin-top: 1px;">
            <span id="status-header" style="opacity: 0.85; color: white;">Hanya kamu yang online</span>
            <span id="typing-header" style="color: #2ecc71; font-weight: 600; display: none;"></span>
          </div>
        </div>
      </div>
      <img src="asets/png/music.png" class="logo-besar-header" alt="Logo">
    </div>

    <div id="sidebar" class="sidebar">
      <div style="padding: 30px 20px; background: #3a7bd5; color: white; display: flex; flex-direction: column; align-items: center; gap: 8px;">
        <img id="side-avatar" src="asets/png/profile.png" style="width: 75px; height: 75px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.3); object-fit: cover; background: #eee;">

        <div style="text-align: center;">
          <div id="side-username" style="font-weight: 600; font-size: 16px; margin-bottom: 2px;">Loading...</div>

          <div onclick="navigator.clipboard.writeText(document.getElementById('my-unique-id').innerText); alert('ID Unik disalin!')" style="font-size: 10px; background: rgba(0,0,0,0.2); padding: 2px 10px; border-radius: 12px; cursor: pointer; display: inline-block; margin-bottom: 5px;">
            ID UNIK: <span id="my-unique-id" style="font-weight: 700;">#-----</span>
          </div>

          <div onclick="window.openEditProfile()" style="font-size: 11px; color: #fff; cursor: pointer; margin-top: 5px; background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px; display: flex; align-items: center; gap: 5px; justify-content: center; border: 1px solid rgba(255,255,255,0.3); font-weight: 600;">
            <i class="fa-solid fa-user-pen" style="font-size: 10px;"></i> Edit Biodata
          </div>

          <div style="font-size: 10px; opacity: 0.8; display: block; margin-top: 8px;">
            <span class="online-dot" style="width:6px; height:6px; margin-right:3px;"></span> Online
          </div>
        </div>
      </div>

      <div style="padding: 15px; border-bottom: 1px solid #eee; background: #fff;">
        <div style="display: flex; background: #f0f2f5; border-radius: 20px; padding: 8px 15px; align-items: center; border: 1px solid #ddd;">
          <span style="color: #3a7bd5; font-weight: bold; margin-right: 5px;">@</span>
          <input type="text" id="input-search-id" placeholder="Cari ID teman..." style="border: none; background: transparent; outline: none; font-size: 13px; width: 100%;">
        </div>
        <button id="btn-search-id" style="width: 100%; margin-top: 8px; border: none; background: #3a7bd5; color: white; border-radius: 12px; padding: 8px; font-size: 11px; font-weight: 600; cursor: pointer;">
          CARI & CHAT
        </button>
      </div>

      <div style="flex: 1; overflow-y: auto; background: white;">
        <div id="private-chat-list">
          <p style="text-align:center; font-size:11px; color:#ccc; margin-top:30px;">Memuat chat...</p>
        </div>
      </div>

      <div style="padding: 10px 0; border-top: 1px solid #eee; background: #fff;">
        <button class="cta" id="btn-sidebar-search" onclick="window.mulaiCariDoi()">
          <span class="span">CARI DOI</span>
          <span class="second">
            <svg width="40px" height="18px" viewBox="0 0 66 43">
              <g id="arrow" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
                <path class="one" d="M40.1543933,3.89485454 L43.9763149,0.139296592 C44.1708311,-0.0518420739 44.4826329,-0.0518571125 44.6771675,0.139262789 L65.6916134,20.7848311 C66.0855801,21.1718824 66.0911863,21.8050225 65.704135,22.1989893 C65.7000188,22.2031791 65.6958657,22.2073326 65.6916762,22.2114492 L44.677098,42.8607841 C44.4825957,43.0519059 44.1708242,43.0519358 43.9762853,42.8608513 L40.1545186,39.1069479 C39.9575152,38.9134427 39.9546793,38.5968729 40.1481845,38.3998695 C40.1502893,38.3977268 40.1524132,38.395603 40.1545562,38.3934985 L56.9937789,21.8567812 C57.1908028,21.6632968 57.193672,21.3467273 57.0001876,21.1497035 C56.9980647,21.1475418 56.9959223,21.1453995 56.9937605,21.1432767 L40.1545208,4.60825197 C39.9574869,4.41477773 39.9546013,4.09820839 40.1480756,3.90117456 C40.1501626,3.89904911 40.1522686,3.89694235 40.1543933,3.89485454 Z" fill="#FFFFFF"></path>
                <path class="two" d="M20.1543933,3.89485454 L23.9763149,0.139296592 C24.1708311,-0.0518420739 24.4826329,-0.0518571125 24.6771675,0.139262789 L45.6916134,20.7848311 C46.0855801,21.1718824 46.0911863,21.8050225 45.704135,22.1989893 C45.7000188,22.2031791 45.6958657,22.2073326 45.6916762,22.2114492 L24.677098,42.8607841 C24.4825957,43.0519059 24.1708242,43.0519358 23.9762853,42.8608513 L20.1545186,39.1069479 C19.9575152,38.9134427 19.9546793,38.5968729 20.1481845,38.3998695 C20.1502893,38.3977268 20.1524132,38.395603 20.1545562,38.3934985 L36.9937789,21.8567812 C37.1908028,21.6632968 37.193672,21.3467273 37.0001876,21.1497035 C36.9980647,21.1475418 36.9959223,21.1453995 36.9937605,21.1432767 L20.1545208,4.60825197 C19.9574869,4.41477773 19.9546013,4.09820839 20.1480756,3.90117456 C20.1501626,3.89904911 20.1522686,3.89694235 20.1543933,3.89485454 Z" fill="#FFFFFF"></path>
                <path class="three" d="M0.154393339,3.89485454 L3.97631488,0.139296592 C4.17083111,-0.0518420739 4.48263286,-0.0518571125 4.67716753,0.139262789 L25.6916134,20.7848311 C26.0855801,21.1718824 26.0911863,21.8050225 25.704135,22.1989893 C25.7000188,22.2031791 25.6958657,22.2073326 25.6916762,22.2114492 L4.67709797,42.8607841 C4.48259567,43.0519059 4.17082418,43.0519358 3.97628526,42.8608513 L0.154518591,39.1069479 C-0.0424848215,38.9134427 -0.0453206733,38.5968729 0.148184538,38.3998695 C0.150289256,38.3977268 0.152413239,38.395603 0.154556228,38.3934985 L16.9937789,21.8567812 C17.1908028,21.6632968 17.193672,21.3467273 17.0001876,21.1497035 C16.9980647,21.1475418 16.9959223,21.1453995 16.9937605,21.1432767 L0.15452076,4.60825197 C-0.0425130651,4.41477773 -0.0453986756,4.09820839 0.148075568,3.90117456 C0.150162624,3.89904911 0.152268631,3.89694235 0.154393339,3.89485454 Z" fill="#FFFFFF"></path>
              </g>
            </svg>
          </span>
        </button>
      </div>
    </div>

    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <div id="bio-modal" class="delete-overlay" style="display: none; align-items: center; justify-content: center;">
      <div class="delete-menu" style="width: 90%; max-width: 350px; text-align: left; padding: 25px;">
        <h2 style="margin: 0 0 10px 0; font-size: 18px; color: #3a7bd5; text-align: center;">Lengkapi Profilmu</h2>
        <p style="font-size: 11px; color: #666; margin-bottom: 20px; text-align: center;">Data ini membantu kami mencari teman yang paling cocok untukmu.</p>

        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
          <div style="flex: 1;">
            <label style="font-size: 11px; font-weight: 600;">Umur</label>
            <input type="number" id="in-umur" placeholder="20" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
          </div>
          <div style="flex: 1;">
            <label style="font-size: 11px; font-weight: 600;">Gender</label>
            <select id="in-gender" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: white;">
              <option value="Pria">Pria</option>
              <option value="Wanita">Wanita</option>
            </select>
          </div>
        </div>

        <label style="font-size: 11px; font-weight: 600;">Zodiak</label>
        <select id="in-zodiak" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: white; margin-bottom: 15px;">
          <option value="Aries">Aries</option><option value="Taurus">Taurus</option>
          <option value="Gemini">Gemini</option><option value="Cancer">Cancer</option>
          <option value="Leo">Leo</option><option value="Virgo">Virgo</option>
          <option value="Libra">Libra</option><option value="Scorpio">Scorpio</option>
          <option value="Sagitarius">Sagitarius</option><option value="Capricorn">Capricorn</option>
          <option value="Aquarius">Aquarius</option><option value="Pisces">Pisces</option>
        </select>

        <label style="font-size: 11px; font-weight: 600;">Hobi</label>
        <input type="text" id="in-hobi" placeholder="Apa kegemaranmu?" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px;">

        <label style="font-size: 11px; font-weight: 600;">Pekerjaan / Kegiatan</label>
        <input type="text" id="in-kerja" placeholder="Contoh: Mahasiswa" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px;">

        <div style="display: flex; gap: 10px;">
          <button class="btn-confirm" id="btn-save-bio" style="flex: 2;">Simpan & Cari</button>
          <button type="button" class="btn-cancel" onclick="window.closeBioModal()" style="flex: 1; padding: 12px; border: none; border-radius: 10px; background: #ccc; color: #333; font-weight: 600; cursor: pointer;">
            Batal
          </button>
        </div>
      </div>
    </div>

    <div class="chat-messages" id="chat-messages"></div>

    <div id="sticker-menu" style="display:none; flex-direction:column; padding:10px; background:#f9f9f9; border-top:1px solid #ccc; height: 300px;">
      <div style="display:flex; gap:8px; margin-bottom:10px; padding: 5px;">
        <input type="text" id="sticker-search-input" placeholder="Cari stiker lucu..." style="flex:1; padding:8px 12px; border-radius:20px; border:1px solid #ddd; outline:none; font-size:14px;">
        <button id="sticker-search-btn" style="background:#3a7bd5; color:white; border:none; border-radius:20px; padding:8px 15px; cursor:pointer; font-weight:600; font-size:12px;">Cari</button>
      </div>
      <div id="sticker-list" style="display:flex; flex-wrap:wrap; overflow-y:auto; flex:1; justify-content:center; gap:5px;"></div>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <div id="reply-preview-box" style="display:none; width:100%; position: relative;"></div>

    <div class="chat-input-container">
      <div class="input-group-wrapper">
        <button id="sticker-btn">
          <i class="fa-regular fa-face-smile"></i>
        </button>
        <textarea id="chat-input" placeholder="Ketik pesan..." rows="1"></textarea>

        <div id="vn-overlay" style="display: none;">
          <div class="vn-content">
            <span class="record-dot">●</span>
            <span id="vn-timer">00:00</span>
            <span class="slide-instruction"><i class="fa-solid fa-chevron-left"></i> Geser untuk batal</span>
          </div>
        </div>
      </div>

      <button id="action-btn">
        <div class="icon-stack">
          <svg class="svg-send" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
          <svg class="svg-mic" viewBox="0 0 24 24" fill="white">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" />
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
          </svg>
        </div>
      </button>
    </div>
  </div>

<div id="delete-overlay" class="delete-overlay">
  <div class="delete-menu">
    <p>Hapus pesan ini?</p>
    <div class="delete-menu-btns">
      <button id="confirm-delete">Hapus</button>
      <button class="btn-cancel" onclick="document.getElementById('delete-overlay').style.display='none'">Batal</button>
    </div>
  </div>
</div>

  <div id="doi-card-modal" class="modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:9999; align-items:center; justify-content:center; padding:20px;">
    <div class="doi-card" style="background:#fff; width:100%; max-width:340px; border-radius:24px; overflow:hidden; position:relative;">
      <div style="position:relative; height:320px; background:#222;">
        <img id="doi-photo" src="" style="width:100%; height:100%; object-fit:cover;">
        <div style="position:absolute; bottom:0; left:0; right:0; background:linear-gradient(to top, rgba(0,0,0,0.9), transparent); padding:24px 20px; color:white;">
          <div style="display:flex; align-items:center; gap:8px;">
            <h2 id="doi-name-age" style="margin:0; font-size:24px; font-weight:700;">Nama, 20</h2>
            <span id="doi-gender-icon" style="font-size:18px;"></span>
          </div>
          <p id="doi-zodiac" style="margin:4px 0 0 0; font-size:14px; opacity:0.8; letter-spacing:0.5px;"></p>
        </div>
      </div>

      <div style="padding:20px; background:#fff;">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:20px;">
          <div>
            <small style="color:#aaa; text-transform:uppercase; font-size:10px; font-weight:700;">Pekerjaan</small>
            <div id="doi-job" style="font-size:14px; color:#333; font-weight:600;">-</div>
          </div>
          <div>
            <small style="color:#aaa; text-transform:uppercase; font-size:10px; font-weight:700;">Hobi</small>
            <div id="doi-hobby" style="font-size:14px; color:#333; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">-</div>
          </div>
        </div>

        <div style="display:flex; gap:12px;">
          <button onclick="window.tutupDoiCard()" class="btn-lewati" style="flex:1; padding:14px; border:none; border-radius:15px; background:#f5f5f5; color:#666; font-weight:700; cursor:pointer;">Skip</button>
          <button id="btn-gas-chat" class="btn-action" style="flex:2; padding:14px; border:none; border-radius:15px; background:linear-gradient(45deg, #3a7bd5, #00d2ff); color:white; font-weight:700; cursor:pointer; box-shadow: 0 4px 15px rgba(58, 123, 213, 0.3);">Chat Sekarang</button>
        </div>
      </div>
    </div>
  </div>
<div id="reaction-menu" class="reaction-menu">
  <span class="reaction-emoji" onclick="sendReaction('👍')">👍</span>
  <span class="reaction-emoji" onclick="sendReaction('❤️')">❤️</span>
  <span class="reaction-emoji" onclick="sendReaction('😂')">😂</span>
  <span class="reaction-emoji" onclick="sendReaction('😮')">😮</span>
  <span class="reaction-emoji" onclick="sendReaction('😢')">😢</span>
  <span class="reaction-emoji" onclick="sendReaction('🙏')">🙏</span>
</div>


  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/chat.js"></script>
</body>
</html>
